<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spell Caster</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap">
<style>
  body { background-color: #f8f9fb; font-family: 'EB Garamond', Georgia, serif; }
  h1 { letter-spacing: 3px; color: #3d405b; font-family: 'EB Garamond', Georgia, serif; }
  h2 { color: #3d405b; font-family: 'EB Garamond', Georgia, serif; }

  .text-panel {
    height: 200px;
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 1rem;
    resize: vertical;
    overflow-y: auto;
    background-color: #ffffff;
    border-color: #ced4da;
  }
  .output-panel {
    height: 200px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-word;
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 1rem;
    background-color: #f1f3f5;
    border: 1px solid #ced4da;
    border-radius: 0.375rem;
    padding: 0.5rem 0.75rem;
    color: #212529;
  }

  #status { font-size: 0.875rem; }

  #phoneme-table th { background-color: #3d405b; color: #fff; }
  #phoneme-table td:first-child { font-family: monospace; font-weight: 600; }
  #phoneme-table td:nth-child(2) { font-size: 1.15rem; }

  .spell-input {
    width: 70px;
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 0.9rem;
  }
</style>
</head>
<body>

<div class="container py-4">

  <div class="d-flex align-items-center justify-content-center mb-4 gap-3">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="80" height="80" aria-label="Spell Caster logo">
      <!-- Outer circle -->
      <circle cx="50" cy="50" r="46" fill="none" stroke="#3d405b" stroke-width="2.5"/>

      <!-- Left page -->
      <path d="M 48,73 L 15,73 L 15,45 Q 31.5,41 48,44 Z"
            fill="#ffffff" stroke="#3d405b" stroke-width="1.8" stroke-linejoin="round"/>
      <!-- Right page -->
      <path d="M 52,73 L 85,73 L 85,45 Q 68.5,41 52,44 Z"
            fill="#ffffff" stroke="#3d405b" stroke-width="1.8" stroke-linejoin="round"/>
      <!-- Spine bottom curve -->
      <path d="M 48,73 Q 50,77 52,73" fill="none" stroke="#3d405b" stroke-width="1.8"/>
      <!-- Spine top curve -->
      <path d="M 48,44 Q 50,42 52,44" fill="none" stroke="#3d405b" stroke-width="1.5"/>

      <!-- Text lines on left page -->
      <line x1="21" y1="52" x2="43" y2="52" stroke="#3d405b" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
      <line x1="21" y1="58" x2="43" y2="58" stroke="#3d405b" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
      <line x1="21" y1="64" x2="35" y2="64" stroke="#3d405b" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
      <!-- Text lines on right page -->
      <line x1="57" y1="52" x2="79" y2="52" stroke="#3d405b" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
      <line x1="57" y1="58" x2="79" y2="58" stroke="#3d405b" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
      <line x1="57" y1="64" x2="72" y2="64" stroke="#3d405b" stroke-width="1" stroke-linecap="round" opacity="0.7"/>

      <!-- IPA symbols rising from the book -->
      <text x="29" y="36" font-family="'EB Garamond', Georgia, serif" font-size="12" fill="#3d405b" text-anchor="middle">ə</text>
      <text x="50" y="25" font-family="'EB Garamond', Georgia, serif" font-size="14" fill="#3d405b" text-anchor="middle">æ</text>
      <text x="71" y="34" font-family="'EB Garamond', Georgia, serif" font-size="12" fill="#3d405b" text-anchor="middle">ɪ</text>
    </svg>
    <h1 class="fw-bold mb-0">Spell Caster</h1>
  </div>

  <div class="row g-3 mb-2">
    <div class="col-md-6">
      <label for="english-input" class="form-label fw-semibold">English</label>
      <textarea id="english-input" class="form-control text-panel" placeholder="Type English text here..."></textarea>
    </div>
    <div class="col-md-6">
      <select id="output-mode" class="form-select form-select-sm mb-2" style="width: auto;">
        <option value="spellcast">Spell Cast</option>
        <option value="arpabet">ARPABET</option>
        <option value="ipa">IPA</option>
        <option value="english">English</option>
      </select>
      <div class="output-panel" id="spell-output"></div>
    </div>
  </div>

  <div class="text-center mb-4">
    <span id="status" class="text-secondary fst-italic">Loading dictionary...</span>
  </div>

  <h2 class="text-center mb-3 fs-5 fw-semibold">ARPABET Phoneme Table</h2>
  <table id="phoneme-table" class="table table-striped table-bordered table-sm align-middle">
    <thead>
      <tr>
        <th>ARPABET</th>
        <th>IPA</th>
        <th>Example</th>
        <th>SpellCast</th>
        <th>Translated</th>
      </tr>
    </thead>
    <tbody id="phoneme-tbody"></tbody>
  </table>

</div>

<script>
const PHONEMES = [
  // Vowels
  { arp: 'AA', ipa: 'ɑ', example: '<strong>o</strong>dd, f<strong>a</strong>ther' },
  { arp: 'AE', ipa: 'æ', example: '<strong>a</strong>t, b<strong>a</strong>t' },
  { arp: 'AH', ipa: 'ʌ', example: 'h<strong>u</strong>t, b<strong>u</strong>t' },
  { arp: 'AO', ipa: 'ɔ', example: '<strong>ou</strong>ght, t<strong>aw</strong>' },
  { arp: 'AW', ipa: 'aʊ', example: 'c<strong>ow</strong>, <strong>ou</strong>t' },
  { arp: 'AY', ipa: 'aɪ', example: 'h<strong>i</strong>de, k<strong>i</strong>te' },
  { arp: 'EH', ipa: 'ɛ', example: '<strong>E</strong>d, b<strong>e</strong>d' },
  { arp: 'ER', ipa: 'ɝ', example: 'b<strong>ir</strong>d, h<strong>er</strong>d' },
  { arp: 'EY', ipa: 'eɪ', example: 's<strong>ay</strong>, m<strong>a</strong>te' },
  { arp: 'IH', ipa: 'ɪ', example: '<strong>i</strong>t, b<strong>i</strong>t' },
  { arp: 'IY', ipa: 'iː', example: 's<strong>ee</strong>, b<strong>ea</strong>t' },
  { arp: 'OW', ipa: 'oʊ', example: 'g<strong>o</strong>, b<strong>oa</strong>t' },
  { arp: 'OY', ipa: 'ɔɪ', example: 'b<strong>oy</strong>, t<strong>oy</strong>' },
  { arp: 'UH', ipa: 'ʊ', example: 'b<strong>oo</strong>k, p<strong>u</strong>t' },
  { arp: 'UW', ipa: 'uː', example: 't<strong>wo</strong>, f<strong>oo</strong>d' },
  // Consonants
  { arp: 'B',  ipa: 'b',  example: '<strong>b</strong>e, a<strong>b</strong>out' },
  { arp: 'CH', ipa: 'tʃ', example: '<strong>ch</strong>eese, wa<strong>tch</strong>' },
  { arp: 'D',  ipa: 'd',  example: '<strong>d</strong>og, a<strong>d</strong>o' },
  { arp: 'DH', ipa: 'ð',  example: '<strong>th</strong>e, brea<strong>th</strong>e' },
  { arp: 'F',  ipa: 'f',  example: '<strong>f</strong>ee, lea<strong>f</strong>' },
  { arp: 'G',  ipa: 'ɡ',  example: '<strong>g</strong>reen, bi<strong>g</strong>' },
  { arp: 'HH', ipa: 'h',  example: '<strong>h</strong>e, a<strong>h</strong>ead' },
  { arp: 'JH', ipa: 'dʒ', example: '<strong>j</strong>ust, e<strong>dge</strong>' },
  { arp: 'K',  ipa: 'k',  example: '<strong>k</strong>ey, ba<strong>ck</strong>' },
  { arp: 'L',  ipa: 'l',  example: '<strong>l</strong>ee, be<strong>ll</strong>' },
  { arp: 'M',  ipa: 'm',  example: '<strong>m</strong>e, ha<strong>m</strong>' },
  { arp: 'N',  ipa: 'n',  example: '<strong>kn</strong>ee, ca<strong>n</strong>' },
  { arp: 'NG', ipa: 'ŋ',  example: 'si<strong>ng</strong>, ri<strong>ng</strong>' },
  { arp: 'P',  ipa: 'p',  example: '<strong>p</strong>ee, ha<strong>pp</strong>y' },
  { arp: 'R',  ipa: 'r',  example: '<strong>r</strong>ead, ca<strong>r</strong>' },
  { arp: 'S',  ipa: 's',  example: '<strong>s</strong>ea, pa<strong>ss</strong>' },
  { arp: 'SH', ipa: 'ʃ',  example: '<strong>sh</strong>e, cra<strong>sh</strong>' },
  { arp: 'T',  ipa: 't',  example: '<strong>t</strong>ea, bu<strong>tt</strong>on' },
  { arp: 'TH', ipa: 'θ',  example: '<strong>th</strong>in, ma<strong>th</strong>' },
  { arp: 'V',  ipa: 'v',  example: '<strong>v</strong>ee, ha<strong>ve</strong>' },
  { arp: 'W',  ipa: 'w',  example: '<strong>w</strong>e, a<strong>w</strong>ay' },
  { arp: 'Y',  ipa: 'j',  example: '<strong>y</strong>es, <strong>y</strong>ard' },
  { arp: 'Z',  ipa: 'z',  example: '<strong>z</strong>oo, ha<strong>z</strong>e' },
  { arp: 'ZH', ipa: 'ʒ',  example: 'vi<strong>si</strong>on, bei<strong>ge</strong>' },
];

const phonemeMap = {};
const ipaMap = {};
PHONEMES.forEach(p => {
  phonemeMap[p.arp] = p.arp;
  ipaMap[p.arp] = p.ipa;
});

// Build phoneme table
const tbody = document.getElementById('phoneme-tbody');
PHONEMES.forEach(p => {
  const tr = document.createElement('tr');
  // Extract plain text from example HTML for translation
  const tmp = document.createElement('div');
  tmp.innerHTML = p.example;
  const exampleText = tmp.textContent;
  tr.innerHTML = `
    <td>${p.arp}</td>
    <td>${p.ipa}</td>
    <td>${p.example}</td>
    <td><input class="form-control form-control-sm spell-input" data-arp="${p.arp}" value="${p.arp}" type="text" maxlength="20"></td>
    <td class="translated-cell" data-example="${exampleText.replace(/"/g, '&quot;')}"></td>
  `;
  tbody.appendChild(tr);
});

// SpellCast input listeners
document.querySelectorAll('.spell-input').forEach(input => {
  input.addEventListener('input', () => {
    phonemeMap[input.dataset.arp] = input.value;
    updateOutput();
  });
});

let cmuDict = null;

async function loadDictionary() {
  const status = document.getElementById('status');
  try {
    const response = await fetch('cmudict-0.7b.txt');
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const text = await response.text();
    cmuDict = {};
    const lines = text.split('\n');
    for (const line of lines) {
      if (line.startsWith(';;;')) continue;
      const trimmed = line.trim();
      if (!trimmed) continue;
      const sepIdx = trimmed.indexOf('  ');
      if (sepIdx === -1) continue;
      const word = trimmed.slice(0, sepIdx);
      if (/\(\d+\)$/.test(word)) continue;
      const phonemes = trimmed.slice(sepIdx + 2).trim().split(' ');
      cmuDict[word.toUpperCase()] = phonemes;
    }
    status.textContent = 'Dictionary loaded.';
    updateOutput();
  } catch (e) {
    status.textContent = `Failed to load dictionary: ${e.message}`;
  }
}

function translate(inputText, mode) {
  if (!cmuDict) return '';
  if (mode === undefined) mode = document.getElementById('output-mode').value;
  if (mode === 'english') return inputText;

  // Tokenize: split into word tokens and non-word separators
  const tokens = inputText.split(/([^a-zA-Z']+)/);
  return tokens.map(token => {
    if (!token) return token;
    // Non-word token (punctuation/whitespace)
    if (/^[^a-zA-Z']/.test(token)) return token;
    // Word token
    const normalized = token.toUpperCase().replace(/[^A-Z]/g, '');
    if (!normalized) return token;
    if (cmuDict[normalized]) {
      const phonemes = cmuDict[normalized];
      const result = phonemes.map(ph => {
        const base = ph.replace(/[012]$/, '');
        if (mode === 'ipa') return ipaMap[base] ?? base;
        if (mode === 'arpabet') return base;
        return phonemeMap[base] ?? base; // spellcast
      }).join('');
      // IPA and SpellCast can contain non-ASCII; only apply case to ARPABET/SpellCast
      if (mode === 'ipa') return result;
      if (token === token.toUpperCase()) return result.toUpperCase();
      if (token[0] === token[0].toUpperCase()) return result[0].toUpperCase() + result.slice(1).toLowerCase();
      return result.toLowerCase();
    } else {
      return '[' + token + ']';
    }
  }).join('');
}

function updateExampleColumn() {
  document.querySelectorAll('.translated-cell').forEach(td => {
    td.textContent = translate(td.dataset.example, 'spellcast');
  });
}

function updateOutput() {
  const input = document.getElementById('english-input').value;
  document.getElementById('spell-output').textContent = translate(input);
  updateExampleColumn();
}

document.getElementById('english-input').addEventListener('input', updateOutput);
document.getElementById('output-mode').addEventListener('change', updateOutput);

loadDictionary();
</script>
</body>
</html>
